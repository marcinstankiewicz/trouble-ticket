version: "3.9"

services:

  db:
    image: postgres:16
    container_name: trouble-ticket-db
    environment:
      POSTGRES_DB: tickets
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  app:
    image: trouble-ticket-api:latest
    container_name: trouble-ticket-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/tickets
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: your-super-secret-key-for-jwt-signing
      SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop

volumes:
  db-data:
