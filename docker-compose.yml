version: '3.8'

services:
  trouble-ticket-app:
    build: .
    container_name: trouble-ticket-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/troubleticket
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=your-production-secret-key-here
      - JWT_EXPIRATION=86400000
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
    depends_on:
      - mysql
    networks:
      - tt-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/troubleTicket"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  mysql:
    image: mysql:8.0
    container_name: trouble-ticket-db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: troubleticket
      MYSQL_USER: ttuser
      MYSQL_PASSWORD: ttpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - tt-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  tt-network:
    driver: bridge

